<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">

        <style>

            :root {
                --azul-escuro: #00458E;
                --quase-preto: #1f2937;
                --azul-claro:  #EFF4FF;
            }

            body {
                background-color: #F8F9FF;
                font-family: system-ui, -apple-system, 
                    BlinkMacSystemFont, "Segoe UI", sans-serif;
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            
            }
            
            dialog::backdrop {
                background-color: rgba(0, 0, 0, 0.45);
            }

            dialog {
                border: none;
                border-radius: 12px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
                width: min(90%, 520px);
                padding: 40px 36px;
                text-align: center;
                background-color: white;
            }

            h2 {
                padding: 2px;
                text-align: left;
                margin: 0 0 12px;
                font-size: 32px;
                line-height: 1.2;
                color: var(--quase-preto);

            }

            p{
                text-align: left;
                margin: 0 0 32px;
                font-size: 16px;
                color: #4b5563;
            }
            
            label {
                font-size: 14px;
                font-weight: 700;
                color: #1f2937;
            }

            input {
                width: 80%;
                box-sizing: border-box;
                height: 46px;
                margin: 0px;
                padding: 0 20px;
                border: 1px solid #9ca3af;
                border-radius: 6px;
                font-size: 15px;
                outline: none;
                background-color: var(--azul-claro);
            }

            input::placeholder {
                color: grey;
            }

            a {
                color: grey;
                text-decoration: none;
                font-size: 14px;
                font-weight: 700;
            }


            button {
                width: 40%;
                padding: 13px 24px;
                align-items: right;
                margin: 0;
                border: none;
                border-radius: 6px;
                background-color: var(--azul-escuro);
                font-size: 14px;
                font-weight: 700;
                color: white;
                cursor: pointer;
                box-shadow: 0 8px 18px rgba(54, 107, 199, 0.28);
            }

            button:hover {
                background-color: rgb(24, 105, 170);
                box-shadow: 0 6px 16px rgba(30, 126, 204, 0.4);
            }

           #faculdade {
                display: flex;
                flex-direction: column;
                align-items: left;
                text-align: left;
                margin: 8px 0 28px;
          } 

            #faculdade label {
                 font-weight: 400;
                 color: #4b5563;
                 display: flex;
                 align-items: left;
                 gap: 8px;
                 
            }

            #confirmar{
                background-color: var(--azul-claro);
                margin: 36px -36px -40px;
                padding: 26px 32px;
                box-sizing: border-box;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                gap: 32px;
                border-radius: 0 0 12px 12px;
            }
        
        </style>
    </head>
    <body>

        <dialog open>

            <h2>Cadastrar Nova Faculdade</h2>

            <p>Preencha os dados básicos da instituição.</p>


            <form>
               <div id="faculdade">
                    <label for="nome">Nome da Faculdade</label><br>
                    <input type="text" placeholder="Ex: Universidade Federal do Ceará" id="name" name="name" required><br>
                    

                    <label for="bairro">Bairro</label><br>
                    <input type="text" placeholder="Ex: Cedro" id="bairro" name="bairro" required><br>
                    
                </div>
            
             
                 <div id="confirmar">
                        <a href="link">Cancelar</a>

                         <button type="submit">Confirmar cadastro</button>
                </div>
            
            </form>
            
            
            
            

           

        <!-- Precisa integrar esse botão a linguagem 
            que está sendo utilizada, 
            no caso não sei se estão usando javascript-->

        </dialog>

        
    </body>
</html>
