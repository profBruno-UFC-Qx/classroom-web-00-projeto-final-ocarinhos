<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./css/redefinirSenha.css">
</head>

<body class="redefinirsenha-body d-flex flex-column min-vh-100">
<main class="redefinirsenha-main flex-grow-1 d-flex align-items-center justify-content-center px-3">
    <div class="card redefinirsenha-card border-0 shadow-sm p-4 p-md-5">
        <!-- Linha azul superior -->
        <div class="top-border"></div>

        <div class="text-center mb-4">
            <div class="redefinirsenha-icon-circle mb-3 mx-auto d-flex align-items-center justify-content-center text-white">
                <i class="fa-solid fa-bus"></i>
            </div>
            <h2 class="redefinirsenha-title fw-bold mb-2">Redefinir Senha</h2>
            <p class="redefinirsenha-subtitle text-muted small px-4">
                Insira o código enviado para o seu e-mail e escolha sua nova senha.
            </p>
        </div>

        <form id="redefinir-form">
            <!-- Código de Verificação -->
            <div class="mb-3">
                <label class="redefinirsenha-label form-label fw-semibold small text-dark">Código de Verificação</label>
                <div class="input-group redefinirsenha-input-group">
                        <span class="input-group-text redefinirsenha-input-icon bg-white border-end-0 text-muted">
                            <i class="fa-solid fa-key"></i>
                        </span>
                    <input type="text" class="form-control redefinirsenha-input border-start-0 ps-0 shadow-none"
                           placeholder="000000" required>
                </div>
            </div>

            <!-- Nova Senha -->
            <div class="mb-3">
                <label class="redefinirsenha-label form-label fw-semibold small text-dark">Nova Senha</label>
                <div class="input-group redefinirsenha-input-group">
                        <span class="input-group-text redefinirsenha-input-icon bg-white border-end-0 text-muted">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                    <input type="password" class="form-control redefinirsenha-input border-start-0 ps-0 shadow-none"
                           placeholder="........" required>
                </div>
            </div>

            <!-- Confirmar Nova Senha -->
            <div class="mb-4">
                <label class="redefinirsenha-label form-label fw-semibold small text-dark">Confirmar Nova Senha</label>
                <div class="input-group redefinirsenha-input-group">
                        <span class="input-group-text redefinirsenha-input-icon bg-white border-end-0 text-muted">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                    <input type="password" class="form-control redefinirsenha-input border-start-0 ps-0 shadow-none"
                           placeholder="........" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary redefinirsenha-btn-submit w-100 py-2 mb-4">
                Redefinir Senha
            </button>
        </form>

        <div class="text-center pt-3 border-top">
            <a href="index.html" class="redefinirsenha-link-voltar text-decoration-none fw-medium small d-flex align-items-center justify-content-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Voltar para o Login
            </a>
        </div>
    </div>
</main>

<footer class="redefinirsenha-footer text-center py-3 text-muted small">
    <i class="fa-solid fa-shield-halved"></i> Acesso seguro e criptografado
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
