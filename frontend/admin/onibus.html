<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/AdmMotoristas/AdmMotoristas.css" />
    <link rel="stylesheet" href="../css/loading/loading.css">
    <script type="module" src="../dist/loading/loading.js"></script>
  </head>
  <body>

    <main class="wrap">
      <div id="sidebar-container"></div>
      <div class="motoristasMain">
        <h1>Gestão de Ônibus</h1>

        <p class="motoristasSubtitle">
          Visualize e gerencie os ônibus cadastrados no sistema.
        </p>

        <div class="motoristasSearch">
          <form action="">
            <input
              type="text"
              placeholder="Buscar nome do ônibus"
            />

            <button type="submit" aria-label="Buscar">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <div class="listActions">
            <div class="motoristasFiltro">
              <select name="filtro" id="filtro">
                <option value="default" selected>Filtros</option>
                <option value="centro">Centro</option>
                <option value="planalto">Bairro Planalto</option>
                <option value="cedro">Cedro</option>
              </select>
            </div>

            <button class="efetuarCadastro">+ Cadastrar ônibus</button>
          </div>
        </div>

        <table class="motoristasTable">
          <tr class="thead">
            <th>NOME DO ÔNIBUS</th>
            <th>PLACA</th>
            <th>DISPONÍVEL</th>
            <th class="alignRight">AÇÕES</th>
          </tr>

          <tfoot>
            <tr class="tfoot">
              <td class="tfoot-info" colspan="2">
                Mostrando 1-5 de 12 ônibus
              </td>

              <td class="tfoot-pager" colspan="2">
                <nav class="motoristasFooter-pagination" aria-label="Paginação">
                  <ul>
                    <li class="prev">
                      <button aria-label="Anterior">
                        <i class="bi bi-chevron-left"></i>
                      </button>
                    </li>

                    <li>
                      <button class="page active" aria-current="page">1</button>
                    </li>

                    <li><button class="page">2</button></li>

                    <li><button class="page">3</button></li>

                    <li class="next">
                      <button aria-label="Próximo">
                        <i class="bi bi-chevron-right"></i>
                      </button>
                    </li>
                  </ul>
                </nav>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </main>

    <div class="motoristasModalOverlay" hidden>
      <section
        class="motoristasModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="onibusModalTitle"
      >
        <header class="motoristasModalHeader">
          <div>
            <span class="motoristasModalEyebrow"> Edição de ônibus </span>

            <h2 id="onibusModalTitle">Editar ônibus</h2>

            <p>Atualize as informações do ônibus cadastrado.</p>
          </div>

          <button
            type="button"
            class="motoristasModalClose"
            aria-label="Fechar modal"
          >
            <i class="bi bi-x-lg"></i>
          </button>
        </header>

        <form class="motoristasModalForm">
          <div class="motoristasModalGrid">
            <label>
              <span>Nome do ônibus</span>

              <input type="text" name="nome" maxlength="45" required />
            </label>

            <label>
              <span>Placa</span>

              <input type="text" name="placa" maxlength="45" required />
            </label>

            <label>
              <span>Disponível</span>

              <select name="disponivel" required>
                <option value="true">Sim</option>
                <option value="false">Não</option>
              </select>
            </label>
          </div>

          <footer class="motoristasModalActions">
            <button
              type="button"
              class="motoristasModalButton secondary motoristasModalCancel"
            >
              Cancelar
            </button>

            <button type="submit" class="motoristasModalButton primary">
              Salvar alterações
            </button>
          </footer>
        </form>
      </section>
    </div>

    <script type="module" src="../dist/admOnibus/admOnibus.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </body>
</html>
