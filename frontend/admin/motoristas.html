<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUO Sistema</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="../css/AdmMotoristas/AdmMotoristas.css" />
  </head>
  <body>
    <div class="wrap">
      <div id="sidebar-container"></div>
      <main class="motoristasMain">
        <h1>Gestão de motoristas</h1>

        <p class="motoristasSubtitle">
          Visualize e gerencie os motoristas cadastrados no sistema.
        </p>

        <div class="motoristasSearch">
          <form action="">
            <input type="text" placeholder="Buscar motoristas por nome" />

            <button type="submit" aria-label="Buscar">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <div class="listActions">
            <div class="motoristasFiltro">
              <select name="filtro" id="filtro">
                <option value="default" selected>Filtros</option>
                <option value="centro">Centro</option>
                <option value="planalto">Bairro Planalto</option>
                <option value="cedro">Cedro</option>
              </select>
            </div>

            <button class="efetuarCadastro">+ Cadastrar motorista</button>
          </div>
        </div>

        <table class="motoristasTable">
          <thead>
            <tr class="thead">
              <th>NOME DO MOTORISTA</th>
              <th>ONIBUS</th>
              <th>KM ATUAL DO MES</th>
              <th class="alignRight">AÇÕES</th>
            </tr>
          </thead>
          <tbody></tbody>

          <tfoot>
            <tr class="tfoot">
              <td class="tfoot-info" colspan="2">
                Mostrando 1-5 de <span class="qtdMotorista"></span> motoristas
              </td>

              <td class="tfoot-pager" colspan="2">
                <nav class="motoristasFooter-pagination" aria-label="Paginação">
                  <ul>
                    <li class="prev">
                      <button aria-label="Anterior">
                        <i class="bi bi-chevron-left"></i>
                      </button>
                    </li>

                    <div class="pages"></div>

                    <li class="next">
                      <button aria-label="Próximo">
                        <i class="bi bi-chevron-right"></i>
                      </button>
                    </li>
                  </ul>
                </nav>
              </td>
            </tr>
          </tfoot>
        </table>
      </main>
    </div>

    <script type="module" src="../dist/admMotoristas/admMotoristas.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </body>
</html>
