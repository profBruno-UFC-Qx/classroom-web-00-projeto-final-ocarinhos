<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUO Sistema</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./../css/AdmFaculdades/AdmFaculdades.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="./../css/admDashboard/admDashboard.css" />
    <link rel="stylesheet" href="../css/loading/loading.css">
    <script type="module" src="../dist/loading/loading.js"></script> 
  </head>
  <body>
    <main class="dashboard-tela">
      <div id="sidebar-container"></div>
      <div class="mainDasboard">
        <section class="container dash-visao-geral">
          <div class="dash-card-visao-geral">
            <div class="dash-card-icon">
              <i class="bi bi-people-fill"></i>
            </div>
            <div class="dash-card-content">
              <p class="dash-card-label">TOTAL DE ALUNOS</p>
              <p class="dash-card-number qtd-alunos">--</p>
            </div>
          </div>
          <div class="dash-card-visao-geral">
            <div class="dash-card-icon">
              <i class="bi bi-bus-front-fill"></i>
            </div>
            <div class="dash-card-content">
              <p class="dash-card-label">ONIBUS DISPONÍVEIS</p>
              <p class="dash-card-number qtd-onibus">--</p>
            </div>
          </div>
          <div class="dash-card-visao-geral">
            <div class="dash-card-icon">
              <i class="bi bi-person-fill"></i>
            </div>
            <div class="dash-card-content">
              <p class="dash-card-label">MOTORISTAS ATIVOS</p>
              <p class="dash-card-number qtd-motoristas">--</p>
            </div>
          </div>
          <div class="dash-card-visao-geral">
            <div class="dash-card-icon">
              <i class="bi bi-signpost-split"></i>
            </div>
            <div class="dash-card-content">
              <p class="dash-card-label">ROTAS ATIVAS</p>
              <p class="dash-card-number qtd-rotas">--</p>
            </div>
          </div>
        </section>

        <section class="container dash-informacoes">
          <section class="dash-dados-alunos">
            <section class="dashboard-freq-semanal dash-card-visao-geral">
              <div class="dash-card-wrapper">
                <div class="dash-card-header">
                  <h3 class="dash-card-title">Frequência por Dia</h3>
                  <button class="filtro">Esta Semana</button>
                </div>
                <canvas id="dashboard"></canvas>
              </div>
            </section>
            <section class="aluno-facul dash-card-visao-geral">
              <div class="dash-card-wrapper">
                  <div class="dash-card-header">
                      <h3 class="dash-card-title">Alunos por Faculdade</h3>
                      <div class="buttonsprox">
                          <button id="btnAnteriorFaculdade">&lt;</button>
                          <button id="btnProximaFaculdade">&gt;</button>
                      </div>
                  </div>
                  <canvas id="graficoFaculdades"></canvas>
              </div>
            </section>
          </section>
          <section class="dash-acoes-e-aviso">
            <section class="mural-avisos dash-card-visao-geral">
              <div class="dash-card-wrapper">
                <div class="dash-card-header">
                  <h3 class="dash-card-title">Mural de Avisos</h3>
                </div>

                <div class="avisos-group"></div>

                <div class="dash-aviso-footer">
                  <a href="./avisos.html" class="dash-aviso-link"
                    >Ver todos os avisos</a
                  >
                </div>
              </div>
            </section>
            <section class="acoes dash-card-visao-geral">
              <div class="dash-card-wrapper">
                <h3 class="dash-card-title">Ações Rápidas</h3>
                <a
                  href="./rotas-complementares.html"
                  class="dash-btn-action dash-btn-primary-action"
                >
                  Acessar rotas
                </a>
                <a
                  href="./motoristas.html"
                  class="dash-btn-action dash-btn-secondary-action"
                >
                  Cadastrar Motorista
                </a>
                <a
                  href="./avisos.html"
                  class="dash-btn-action dash-btn-secondary-action"
                >
                  Criar Aviso
                </a>
              </div>
            </section>
          </section>
        </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../dist/admin/alunos.js"></script>
    <script type="module" src="../dist/admDashboard/admDashboard.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </body>
</html>
