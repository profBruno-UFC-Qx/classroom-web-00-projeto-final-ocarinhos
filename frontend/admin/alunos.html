<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUO Sistema</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/AdminAlunos/AdminAlunos.css" />
    <link rel="stylesheet" href="./../css/sidebar.css" />
  </head>
  <body>
    <main class="wrap">
      <div id="sidebar-container"></div>
      <div class="alunosMain">
        <h1>Listagem de Alunos</h1>
        <p class="alunosSubtitle">
          Gerencie o registro e as informações acadêmicas dos estudantes da
          instituição.
        </p>
        <div class="alunosSearch">
          <form action="">
            <input type="text" placeholder="Buscar por nome do aluno" />
            <button type="submit" aria-label="Buscar">
              <i class="bi bi-search"></i>
            </button>
          </form>
          <div class="alunosFiltro">
            <select name="filtro" id="filtro">
              <option value="">Todas as Faculdades</option>
            </select>
          </div>
        </div>

        <table class="alunosTable">
          <tr class="thead">
            <th>NOME DO ALUNO</th>
            <th>E-MAIL</th>
            <th>FACULDADE</th>
            <th>CURSO</th>
            <th class="status">STATUS</th>
            <th class="buttons alignRight">AÇÕES</th>
          </tr>
          <tfoot>
            <tr class="tfoot">
              <td class="tfoot-info" colspan="4">
                Mostrando 1 a 5 de 156 alunos
              </td>
              <td class="tfoot-pager" colspan="2">
                <nav class="alunosFooter-pagination" aria-label="Paginação">
                  <ul>
                    <li class="prev">
                      <button aria-label="Anterior">
                        <i class="bi bi-chevron-left"></i>
                      </button>
                    </li>

                    <li class="pagination-pages"></li>

                    <li class="next">
                      <button aria-label="Próximo">
                        <i class="bi bi-chevron-right"></i>
                      </button>
                    </li>
                </ul>
                </nav>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </main>

    <div class="alunosModalOverlay" hidden>
      <section
        class="alunosModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="alunosModalTitle"
      >
        <header class="alunosModalHeader">
          <div>
            <span class="alunosModalEyebrow">Edição de cadastro</span>
            <h2 id="alunosModalTitle">Editar aluno</h2>
            <p>Atualize as informações e salve as mudanças no registro.</p>
          </div>
          <button
            type="button"
            class="alunosModalClose"
            aria-label="Fechar modal"
          >
            <i class="bi bi-x-lg"></i>
          </button>
        </header>

        <form class="alunosModalForm">
          <div class="alunosModalGrid">
            <label>
              <span>Nome do aluno</span>
              <input
                type="text"
                name="nome"
                id="alunoNome"
                maxlength="45"
                required
              />
            </label>
            <label>
              <span>E-mail</span>
              <input
                type="email"
                name="email"
                id="alunoEmail"
                maxlength="45"
                required
              />
            </label>
            <label>
              <span>Faculdade</span>
              <input
                type="text"
                name="faculdade"
                id="alunoFaculdade"
                maxlength="45"
                required
              />
            </label>
            <label>
              <span>Curso</span>
              <input type="text" name="curso" id="alunoCurso" required />
            </label>
            <label class="alunosModalStatusField">
              <span>Status</span>
              <select name="status" id="alunoStatus">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
              </select>
            </label>
          </div>

          <footer class="alunosModalActions">
            <button
              type="button"
              class="alunosModalButton secondary alunosModalCancel"
            >
              Cancelar
            </button>
            <button type="submit" class="alunosModalButton primary">
              Salvar alterações
            </button>
          </footer>
        </form>
      </section>
    </div>

    <script type="module" src="../dist/admin/alunos.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </body>
</html>
