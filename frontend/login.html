<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="login-bg">
      <div class="login">
        <div class="icon">
          <img src="./assets/Login/Margin.svg" alt="" />
        </div>

        <h2>Acesso Institucional</h2>
        <p class="sub-text">
          Insira suas credenciais para gerenciar a logística.
        </p>

        <form class="form">
          <div class="input-group">
            <label>Nome</label>
            <input type="text" placeholder="" />
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" placeholder="aluno@gmail.com" />
          </div>

          <button type="submit">Entrar →</button>
        </form>
        <footer class="footer">
          Primeiro acesso? <a href="./register.html">Cadastre-se</a>
        </footer>
      </div>
    </div>
  </body>
</html>
