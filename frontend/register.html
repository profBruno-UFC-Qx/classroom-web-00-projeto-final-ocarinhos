<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="register-bg">
      <div class="register">
        <div class="icon">
          <img src="./assets/Login/Margin.svg" alt="" />
        </div>

        <h2>Cadastro de Aluno</h2>
        <p class="sub-text">Transporte Universitário Ocara.</p>

        <form class="form">
          <div class="input-group">
            <label for="nome">Nome</label>
            <input
              name="nome"
              id="nome"
              type="text"
              placeholder="Digite seu nome aqui"
            />
            <p class="nome"></p>
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input
              name="email"
              id="email"
              type="email"
              placeholder="aluno@gmail.com"
            />
            <p class="email"></p>
          </div>

          <div class="input-group">
            <label for="ies">Faculdade</label>
            <select name="ies" id="ies">
              <option value="">Selecione sua instituição</option>
              <option value="cep">CEP</option>
              <option value="epp">EPP</option>
              <option value="estacio">ESTÁCIO</option>
              <option value="fadat">FADAT</option>
              <option value="feclesc">FECLESC</option>
              <option value="ifce">IFCE</option>
              <option value="senac">SENAC</option>
              <option value="ufc">UFC</option>
              <option value="uniasselvi">UNIASSELVI</option>
              <option value="unicatolica">UNICATÓLICA</option>
              <option value="unigrande">UNIGRANDE</option>
              <option value="uniplan">UNIPLAN</option>
              <option value="unopar">UNOPAR</option>
            </select>
            <p class="ies"></p>
          </div>

          <div class="input-group">
            <label for="curso">Curso</label>
            <input
              name="curso"
              id="curso"
              type="text"
              placeholder="Qual o seu curso?"
            />
            <p class="curso"></p>
          </div>

          <div class="group-password">
            <div class="input-group">
              <label for="senha">SENHA</label>
              <input
                name="senha"
                id="senha"
                type="password"
                placeholder="••••••••"
              />
              <p class="senha"></p>
            </div>

            <div class="input-group">
              <label for="confirmar-senha">CONFIRMAR SENHA</label>
              <input
                name="confirmar-senha"
                id="confirmar-senha"
                type="password"
                placeholder="••••••••"
              />
              <p class="confirmar-senha"></p>
            </div>
          </div>

          <button type="submit">Entrar</button>
        </form>
        <footer class="footer">
          Ja tem uma conta? <a href="./login.html">Entrar</a>
        </footer>
      </div>
    </div>

    <script type="module" src="./dist/register/register.js"></script>
  </body>
</html>
