<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="register-bg">
      <div class="register">
        <div class="icon">
          <img src="./assets/Login/Margin.svg" alt="" />
        </div>

        <h2>Cadastro de Aluno</h2>
        <p class="sub-text">Transporte Universitário Ocara.</p>

        <form class="form">
          <div class="input-group">
            <label>Nome</label>
            <input type="text" placeholder="" />
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" placeholder="aluno@gmail.com" />
          </div>

          <div class="input-group">
            <label>Faculdade</label>
            <select name="IES" id="ies">
              <option value="">Selecione sua instituição</option>
              <option value="cep">CEP</option>
              <option value="epp">EPP</option>
              <option value="estacio">ESTÁCIO</option>
              <option value="fadat">FADAT</option>
              <option value="feclesc">FECLESC</option>
              <option value="ifce">IFCE</option>
              <option value="senac">SENAC</option>
              <option value="ufc">UFC</option>
              <option value="uniasselvi">UNIASSELVI</option>
              <option value="unicatolica">UNICATÓLICA</option>
              <option value="unigrande">UNIGRANDE</option>
              <option value="uniplan">UNIPLAN</option>
              <option value="unopar">UNOPAR</option>
            </select>
          </div>

          <div class="input-group">
            <label>Curso</label>
            <input type="text" placeholder="Qual o seu curso?" />
          </div>

          <div class="group-password">
            <div class="input-group">
              <label>SENHA</label>
              <input type="password" placeholder="••••••••" />
            </div>

            <div class="input-group">
              <label>CONFIRMAR SENHA</label>
              <input type="password" placeholder="••••••••" />
            </div>
          </div>

          <button type="submit">Entrar →</button>
        </form>
        <footer class="footer">
          Ja tem uma conta? <a href="./login.html">Entrar</a>
        </footer>
      </div>
    </div>
  </body>
</html>
