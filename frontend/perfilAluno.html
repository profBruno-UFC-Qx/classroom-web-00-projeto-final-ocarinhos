<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Aluno - AUO</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/perfilAluno/perfilAluno.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="header-content">
        <h1 class="logo-title">Transporte Universitário Ocara</h1>
        <div class="header-user-info">
          <i class="bi bi-bell header-icon"></i>
          <i class="bi bi-gear header-icon"></i>
          <span class="user-nickname">Painel do Aluno</span>
          <img
            src="https://i.imgur.com/nRLKK3l.jpeg"
            alt="Avatar"
            class="mini-avatar"
          />
        </div>
      </div>
    </header>

    <main class="profile-container">
      <div class="profile-grid">
        <aside class="sidebar-info">
          <section class="card profile-pic-card">
            <div class="profile-img-wrapper">
              <img src="https://i.imgur.com/nRLKK3l.jpeg" alt="Foto do Aluno" />
              <button class="edit-photo-btn">
                <i class="bi bi-camera"></i>
              </button>
            </div>
            <h2 class="display-name">Nome do Aluno</h2>
            <p class="display-major">CURSO DO ALUNO</p>
            <div class="status-badges">
              <span class="badge uni-badge">UFC</span>
              <span class="badge status-badge">Ativo</span>
            </div>
          </section>

          <section class="card status-check-card">
            <div class="status-content-wrapper">
              <div class="status-icon-circle">
                <i class="bi bi-patch-check"></i>
              </div>
              <div class="status-text">
                <h3>Situação Cadastral</h3>
                <p>Seu cadastro está validado para o semestre 2024.2</p>
              </div>
              <div class="check-mark">
                <i class="bi bi-check-lg"></i>
              </div>
            </div>
          </section>
        </aside>

        <section class="main-content-info">
          <div class="card info-form-card">
            <header class="form-header">
              <i class="bi bi-person-vcard"></i>
              <h3>Minhas Informações</h3>
            </header>

            <form class="student-form">
              <div class="form-grid">
                <div class="input-group">
                  <label>Nome Completo</label>
                  <input type="text" placeholder="Nome do Aluno" />
                </div>
                <div class="input-group">
                  <label>Email Acadêmico</label>
                  <input type="email" placeholder="email@exemplo.com" />
                </div>
                <div class="input-group">
                  <label>Faculdade</label>
                  <select>
                    <option value="UFC">UFC</option>
                    <option value="UECE">UECE</option>
                    <option value="IFCE">IFCE</option>
                  </select>
                </div>
                <div class="input-group">
                  <label>Telefone / WhatsApp</label>
                  <input type="text" placeholder="(00) 00000-0000" />
                </div>
                <div class="input-group full-width">
                  <label>Curso</label>
                  <input type="text" placeholder="Seu curso de graduação" />
                </div>
              </div>

              <div class="form-actions">
                <button type="button" class="btn-cancel">Cancelar</button>
                <button type="submit" class="btn-save">
                  <i class="bi bi-download"></i> Salvar Alterações
                </button>
              </div>
            </form>
          </div>

          <div class="card virtual-pass-card">
            <div class="pass-info">
              <h3>Passe Estudantil Virtual</h3>
              <p>Apresente seu QR Code ao embarcar para validação rápida.</p>
              <button class="btn-qr-view">VISUALIZAR CÓDIGO</button>
            </div>
            <div class="qr-code-wrapper">
              <i class="bi bi-qr-code-scan"></i>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
